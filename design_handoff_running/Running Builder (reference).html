<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>Trainwise — Séance course (Garmin-style)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0b2a47; --navy-deep:#072036; --navy-ink:#051a2e;
    --cyan:#1aaef5; --cyan-soft:#eaf6fd; --cyan-tint:#eef7fd;
    --ivory:#f2efe9; --paper:#fff; --line:#e8e4db;
    --muted:#5a6878; --muted-2:#8a94a1;
    --violet:#7c5cdb; --violet-2:#9b6ff0; --violet-soft:#efeafb;
    --green:#1fb77a; --green-soft:#e6f7ee;
    --amber:#f5a623; --amber-soft:#fdf2da;
    --teal:#37bd9c; --teal-soft:#e3f6f0;
    --red:#e74c3c;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',sans-serif;background:#1d2733;color:var(--navy-ink)}
  .screen{background:var(--ivory);height:100%;overflow-y:auto;font-family:'Inter',sans-serif;display:flex;flex-direction:column}
  .screen::-webkit-scrollbar{width:0}

  /* ===== App header ===== */
  .appbar{background:var(--navy);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:5}
  .appbar .av{width:36px;height:36px;border-radius:50%;background:#cdd7e0;border:2px solid #ffffff30;flex:0 0 36px;background-size:cover;background-position:center}
  .appbar .pro{border:1.5px solid var(--green);color:#7fe3b4;font-size:10px;font-weight:800;letter-spacing:.08em;padding:3px 9px;border-radius:999px}
  .appbar .brand{flex:1;text-align:center;font-family:'Archivo Black',sans-serif;font-style:italic;font-size:17px;line-height:.92;color:#fff;transform:translateX(-6px)}
  .appbar .brand .w{color:var(--cyan);display:block}
  .appbar .bell{width:30px;height:30px;border-radius:50%;background:#ffffff14;display:grid;place-items:center;color:#fff;position:relative;flex:0 0 30px}
  .appbar .bell .b{position:absolute;top:-3px;right:-3px;background:#ff4d4d;color:#fff;font-size:9px;font-weight:800;border-radius:50%;width:15px;height:15px;display:grid;place-items:center}

  .body{flex:1;padding:14px 14px 18px}

  .titlerow{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px}
  .backbtn{width:42px;height:42px;border-radius:13px;background:#fff;display:grid;place-items:center;box-shadow:0 2px 8px -4px #0b2a4733;flex:0 0 42px;color:var(--navy-ink)}
  .titlerow .tt{flex:1;min-width:0}
  .titlerow h1{font-family:'Archivo Black',sans-serif;font-style:italic;font-size:24px;margin:0;letter-spacing:-.01em;line-height:1}
  .titlerow .date{font-size:13px;color:var(--muted);margin-top:5px;font-weight:500}
  .statuspill{font-size:11px;font-weight:800;letter-spacing:.06em;padding:7px 13px;border-radius:999px;white-space:nowrap;text-transform:uppercase}
  .statuspill.draft{background:var(--violet);color:#fff}
  .statuspill.todo{background:var(--amber);color:#fff}
  .statuspill.done{background:var(--green);color:#fff}

  /* identity */
  .idcard{background:#fff;border-radius:20px;padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:14px;box-shadow:0 2px 14px -8px #0b2a4726}
  .idcard .emoji{width:54px;height:54px;border-radius:16px;display:grid;place-items:center;font-size:28px;flex:0 0 54px;background:linear-gradient(135deg,var(--cyan) 0%, var(--violet) 120%)}
  .idcard .info{flex:1;min-width:0}
  .idcard h1{font-family:'Archivo Black',sans-serif;font-style:italic;font-size:23px;margin:0;letter-spacing:-.01em;line-height:1}
  .idcard .date{font-size:13px;color:var(--muted);margin-top:4px;font-weight:500}

  /* ===== Summary (serious timeline) ===== */
  .summary{background:#fff;border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 2px 14px -8px #0b2a4726}
  .timeline{display:flex;gap:2px;height:12px;border-radius:999px;overflow:hidden;margin-bottom:6px}
  .tlseg{height:100%}
  .tllabels{display:flex;gap:2px;margin-bottom:14px}
  .tllabel{font-size:8.5px;letter-spacing:.05em;text-transform:uppercase;font-weight:700;color:var(--muted-2);text-align:center}
  .sumstats{display:flex}
  .sumstat{flex:1;text-align:center;border-right:1px solid var(--line)}
  .sumstat:last-child{border-right:none}
  .sumstat .v{font-family:'Archivo Black',sans-serif;font-style:italic;font-size:20px;color:var(--navy-ink);line-height:1}
  .sumstat .l{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:5px}

  .note{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:16px;box-shadow:0 2px 14px -8px #0b2a4726}
  .note .nl{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
  .note .nt{font-size:14px;color:var(--navy-ink);line-height:1.45}

  .section-label{font-family:'Archivo Black',sans-serif;font-style:italic;font-size:17px;margin:4px 0 12px;letter-spacing:-.01em}

  /* ===== Garmin-style step row ===== */
  .step{background:#fff;border-radius:14px;padding:12px 12px 12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 10px -7px #0b2a4733;position:relative;overflow:hidden}
  .step::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px}
  .step.warm::before{background:var(--amber)}
  .step.run::before{background:var(--cyan)}
  .step.rec::before{background:var(--teal)}
  .step.cool::before{background:var(--violet)}
  .step.rest::before{background:var(--muted-2)}
  .step-ico{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:16px;flex:0 0 34px}
  .step.warm .step-ico{background:var(--amber-soft)}
  .step.run .step-ico{background:var(--cyan-soft)}
  .step.rec .step-ico{background:var(--teal-soft)}
  .step.cool .step-ico{background:var(--violet-soft)}
  .step.rest .step-ico{background:#eef0f3}
  .step-main{flex:1;min-width:0}
  .step-type{font-size:9.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px}
  .step.warm .step-type{color:#bd7d12}
  .step.run .step-type{color:#0e7fc0}
  .step.rec .step-type{color:#1d9e7e}
  .step.cool .step-type{color:#6243c0}
  .step.rest .step-type{color:var(--muted)}
  .step-val{font-size:17px;font-weight:800;color:var(--navy-ink);line-height:1.1}
  .step-val .unit{font-size:13px;font-weight:700;color:var(--muted)}
  .step-target{font-size:12px;color:var(--muted);margin-top:3px;font-weight:600}
  .step-target b{color:var(--navy-ink)}
  .step-tools{display:flex;flex-direction:column;align-items:center;gap:8px;flex:0 0 auto}
  .step-grip{color:#c4cdd6;font-size:14px;letter-spacing:-2px;line-height:1}
  .step-edit{width:30px;height:30px;border-radius:9px;background:var(--ivory);display:grid;place-items:center;color:var(--cyan)}

  /* ===== Repeat block (Garmin bracket) ===== */
  .repeat{background:var(--cyan-tint);border-radius:16px;padding:12px;margin-bottom:10px;border:1px solid #d4eafb}
  .repeat-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .repeat-head .rl{flex:1;display:flex;align-items:center;gap:7px;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#0e7fc0}
  .stepper{display:flex;align-items:center;gap:8px;background:#fff;border-radius:10px;padding:4px 6px;box-shadow:0 1px 3px #0b2a4711}
  .stepper button{width:28px;height:28px;border:none;border-radius:7px;background:var(--cyan-soft);color:var(--cyan);font-size:17px;font-weight:800;line-height:1;display:grid;place-items:center}
  .stepper .sv{font-family:'Archivo Black',sans-serif;font-style:italic;font-size:16px;min-width:34px;text-align:center;color:var(--navy-ink)}
  .repeat-body{padding-left:12px;border-left:2px dashed #9fd4f5}
  .repeat-body .step{margin-bottom:8px}
  .repeat-body .step:last-child{margin-bottom:0}

  /* add bar */
  .addrow{display:flex;gap:8px;margin:4px 0 16px}
  .addchip{flex:1;border:1.5px dashed var(--cyan);color:var(--cyan);border-radius:12px;padding:12px 8px;display:flex;align-items:center;justify-content:center;gap:7px;font-size:13px;font-weight:700;background:#fbfdff}
  .addchip .pc{width:20px;height:20px;border-radius:50%;background:var(--cyan);color:#fff;display:grid;place-items:center;font-size:13px;font-weight:800}
  .addchip.alt{border-color:var(--violet);color:var(--violet);background:#fcfbff}
  .addchip.alt .pc{background:var(--violet)}

  .cta{margin-top:6px;background:linear-gradient(135deg,var(--violet) 0%, var(--violet-2) 100%);color:#fff;border-radius:16px;padding:17px;text-align:center;font-weight:800;font-size:15px;letter-spacing:.04em;text-transform:uppercase;box-shadow:0 12px 26px -12px var(--violet);display:flex;align-items:center;justify-content:center;gap:9px}

  /* alert + ressenti */
  .alert{background:var(--amber-soft);border:1.5px solid #f3d690;border-radius:16px;padding:16px;margin-bottom:16px}
  .alert .at{font-size:15px;font-weight:800;color:#8a5a08;line-height:1.3;margin-bottom:6px}
  .alert .ad{font-size:13.5px;color:#a06f1c;line-height:1.45}
  .card{background:#fff;border-radius:20px;padding:18px;margin-bottom:16px;box-shadow:0 2px 14px -8px #0b2a4726}
  .card-h{font-family:'Archivo Black',sans-serif;font-style:italic;font-size:15px;color:var(--navy-ink);margin:0 0 4px;text-transform:uppercase}
  .rpe-row{display:flex;align-items:center;gap:14px;margin:12px 0 16px}
  .rpe-face{width:64px;height:64px;border-radius:18px;background:var(--amber-soft);display:grid;place-items:center;font-size:36px;flex:0 0 64px}
  .rpe-info .rn{font-family:'Archivo Black',sans-serif;font-style:italic;font-size:34px;line-height:.9;color:var(--amber)}
  .rpe-info .rl{font-size:16px;font-weight:800;color:var(--amber);margin-top:2px}
  .rpe-info .rd{font-size:12px;color:var(--muted);margin-top:3px}
  .rpe-track{position:relative;height:10px;border-radius:999px;background:linear-gradient(90deg,#e74c3c,#f5a623 50%,#37bd9c);margin:6px 4px 10px}
  .rpe-knob{position:absolute;top:50%;width:24px;height:24px;border-radius:50%;background:#fff;border:3px solid var(--cyan);transform:translate(-50%,-50%);box-shadow:0 2px 8px -2px #0b2a4755}
  .rpe-ends{display:flex;justify-content:space-between;font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-2)}
  .plan-intro{font-size:13px;color:var(--muted);line-height:1.5;font-style:italic;margin:0 0 14px}

  /* compare (screen 4) */
  .step-compare{display:flex;align-items:baseline;gap:8px;margin-top:2px}
  .sc-old{font-size:13px;color:var(--muted-2);text-decoration:line-through;font-weight:600}
  .sc-arrow{color:var(--muted-2);font-size:12px}
  .sc-new{font-size:17px;color:var(--cyan);font-weight:800}

  .total{background:linear-gradient(135deg,var(--cyan) 0%, #0e90d6 100%);color:#fff;border-radius:14px;padding:15px 18px;display:flex;justify-content:space-between;align-items:center;margin-top:4px;box-shadow:0 10px 22px -12px var(--cyan)}
  .total .tl{font-size:14px;font-weight:700}
  .total .tv{font-family:'Archivo Black',sans-serif;font-style:italic;font-size:22px}
  .modbtn{border:1.5px solid var(--cyan);color:var(--cyan);background:#fff;font-size:14px;font-weight:700;padding:9px 16px;border-radius:11px}

  .tabs{background:var(--navy);padding:12px 26px 16px;display:flex;justify-content:space-between;position:sticky;bottom:0}
  .tabs .t{width:26px;height:26px;color:#ffffff55;display:grid;place-items:center}
  .tabs .t.on{color:var(--cyan)}
</style>
</head>
<body>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>

<div id="root"></div>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { IOSDevice } = window;

const I = {
  home:  <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3l9 8h-2v9h-5v-6h-4v6H5v-9H3z"/></svg>,
  folder:<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M3 5h6l2 2h10v12H3z"/></svg>,
  chat:  <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2 4v14l4-4h16V4H2z"/></svg>,
  user:  <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>,
  cal:   <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="5" width="18" height="16" rx="2"/></svg>,
  route: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><circle cx="6" cy="19" r="2"/><circle cx="18" cy="6" r="2"/><path d="M8 19h6a3 3 0 0 0 0-6H9a3 3 0 0 1 0-6h7"/></svg>,
  bell:  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a7 7 0 0 0-7 7v5l-2 3h18l-2-3V9a7 7 0 0 0-7-7zm-3 18a3 3 0 0 0 6 0H9z"/></svg>,
  back:  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg>,
  pencil:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>,
  flag:  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3v18M5 4h12l-2 4 2 4H5"/></svg>,
  repeat:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>,
};

const AppBar = ({pro, avatar}) => (
  <div className="appbar">
    <div className="av" style={{backgroundImage:`url(${avatar})`}}></div>
    {pro && <div className="pro">PRO</div>}
    <div className="brand"><span>Train</span><span className="w">wise</span></div>
    <div className="bell">{I.bell}<span className="b">1</span></div>
  </div>
);
const Tabs = ({set="athlete"}) => (
  <div className="tabs">
    {set==="coach"
      ? <><div className="t on">{I.home}</div><div className="t">{I.folder}</div><div className="t">{I.chat}</div><div className="t">{I.user}</div></>
      : <><div className="t on">{I.home}</div><div className="t">{I.chat}</div><div className="t">{I.cal}</div><div className="t">{I.route}</div></>}
  </div>
);
const AV_COACH = "https://i.pravatar.cc/100?img=12";
const AV_ATH = "https://i.pravatar.cc/100?img=33";

/* ---- Garmin-style step ---- */
const TYPE_META = {
  warm: {cls:"warm", ico:"🔥", label:"Échauffement"},
  run:  {cls:"run",  ico:"🏃", label:"Course"},
  rec:  {cls:"rec",  ico:"💧", label:"Récupération"},
  cool: {cls:"cool", ico:"🧊", label:"Retour au calme"},
  rest: {cls:"rest", ico:"⏸️", label:"Repos"},
};
const Step = ({type, label, value, unit, target, edit=true, compare}) => {
  const m = TYPE_META[type];
  return (
    <div className={"step "+m.cls}>
      <div className="step-ico">{m.ico}</div>
      <div className="step-main">
        <div className="step-type">{label || m.label}</div>
        {compare
          ? <div className="step-compare"><span className="sc-old">{compare.old}</span><span className="sc-arrow">→</span><span className="sc-new">{compare.now}</span></div>
          : <div className="step-val">{value}{unit && <span className="unit"> {unit}</span>}</div>}
        {target && <div className="step-target">{target}</div>}
      </div>
      <div className="step-tools">
        <div className="step-grip">⋮⋮</div>
        {edit && <div className="step-edit">{I.pencil}</div>}
      </div>
    </div>
  );
};

const Stepper = ({v}) => (
  <div className="stepper"><button>−</button><span className="sv">{v}×</span><button>+</button></div>
);

/* =============================================================
   SCREEN 1 — COACH builder (Garmin-style)
   ============================================================= */
const ScreenCoach = () => (
  <div className="screen">
    <AppBar avatar={AV_COACH}/>
    <div className="body">
      <div className="idcard">
        <div className="emoji">🏃‍♂️</div>
        <div className="info"><h1>Endurance</h1><div className="date">mardi 30 juin 2026</div></div>
        <div className="statuspill draft">Brouillon</div>
      </div>

      <div className="summary">
        <div className="timeline">
          <div className="tlseg" style={{flex:3, background:'var(--amber)'}}></div>
          <div className="tlseg" style={{flex:1.5, background:'var(--cyan)'}}></div>
          <div className="tlseg" style={{flex:1, background:'var(--teal)'}}></div>
          <div className="tlseg" style={{flex:1.5, background:'var(--cyan)'}}></div>
          <div className="tlseg" style={{flex:1, background:'var(--teal)'}}></div>
          <div className="tlseg" style={{flex:1.5, background:'var(--cyan)'}}></div>
          <div className="tlseg" style={{flex:1, background:'var(--teal)'}}></div>
          <div className="tlseg" style={{flex:3, background:'var(--violet)'}}></div>
        </div>
        <div className="tllabels">
          <div className="tllabel" style={{flex:3}}>Échauf.</div>
          <div className="tllabel" style={{flex:7}}>Fractionné ×8</div>
          <div className="tllabel" style={{flex:3}}>Calme</div>
        </div>
        <div className="sumstats">
          <div className="sumstat"><div className="v">8,4<span style={{fontSize:12}}> km</span></div><div className="l">Distance</div></div>
          <div className="sumstat"><div className="v">~48<span style={{fontSize:12}}> min</span></div><div className="l">Durée</div></div>
          <div className="sumstat"><div className="v">4</div><div className="l">Étapes</div></div>
        </div>
      </div>

      <div className="note">
        <div className="nl">💬 Consignes globales</div>
        <div className="nt">Reste relâché sur les fractions — l'objectif c'est la régularité, pas la vitesse max.</div>
      </div>

      <div className="section-label">Plan de la séance</div>

      <Step type="warm" value="15 min" target={<>Cible · <b>Allure libre</b> · Z2</>}/>

      <div className="repeat">
        <div className="repeat-head">
          <div className="rl">{I.repeat} Répéter</div>
          <Stepper v="8"/>
        </div>
        <div className="repeat-body">
          <Step type="run" value="400 m" target={<>Cible · <b>4:00 /km</b> · Z4</>}/>
          <Step type="rec" value="1:00" target={<>Récup · <b>footing lent</b> · Z1</>}/>
        </div>
      </div>

      <Step type="cool" value="10 min" target={<>Cible · <b>Allure libre</b> · Z2</>}/>

      <div className="addrow">
        <div className="addchip"><span className="pc">+</span> Étape</div>
        <div className="addchip alt"><span className="pc">+</span> Bloc à répéter</div>
      </div>

      <div className="cta">{I.flag} Créer la séance</div>
    </div>
    <Tabs set="coach"/>
  </div>
);

/* =============================================================
   SCREEN 2 — ATHLETE: ressenti + à compléter
   ============================================================= */
const ScreenRessenti = () => (
  <div className="screen">
    <AppBar pro avatar={AV_ATH}/>
    <div className="body">
      <div className="titlerow">
        <div className="backbtn">{I.back}</div>
        <div className="tt"><h1>test</h1><div className="date">Mardi 30 juin 2026</div></div>
        <div className="statuspill todo">À compléter</div>
      </div>
      <div className="alert">
        <div className="at">Séance faite mais pas encore détaillée 🏁</div>
        <div className="ad">Renseigne tes valeurs réelles ci-dessous pour la convertir en course et suivre ta progression.</div>
      </div>
      <div className="card">
        <div className="card-h">Ressenti de séance</div>
        <div className="rpe-row">
          <div className="rpe-face">😊</div>
          <div className="rpe-info"><div className="rn">5</div><div className="rl">Correct</div><div className="rd">Sur une échelle de 1 à 10</div></div>
        </div>
        <div className="rpe-track"><div className="rpe-knob" style={{left:'50%'}}></div></div>
        <div className="rpe-ends"><span>Épuisant</span><span>Excellent</span></div>
      </div>
      <div className="card" style={{marginBottom:0}}>
        <div className="card-h">Plan de la séance</div>
        <div className="plan-intro">Le plan du coach est pré-rempli. Touche le crayon ✎ pour ajuster une étape si tu as fait différemment.</div>
        <Step type="warm" value="15 min" target={<>Réalisé · <b>à confirmer</b></>}/>
      </div>
      <div className="cta" style={{marginTop:16}}>Enregistrer ma course →</div>
    </div>
    <Tabs/>
  </div>
);

/* =============================================================
   SCREEN 3 — ATHLETE: fill plan (Garmin steps)
   ============================================================= */
const ScreenFill = () => (
  <div className="screen">
    <AppBar pro avatar={AV_ATH}/>
    <div className="body">
      <div style={{marginBottom:14}}>
        <h1 style={{fontFamily:"'Archivo Black',sans-serif",fontStyle:'italic',fontSize:24,margin:0}}>Plan de la séance</h1>
        <div className="plan-intro" style={{marginTop:8}}>Touche le crayon ✎ pour ajuster une étape si tu l'as faite différemment du plan.</div>
      </div>

      <Step type="warm" value="15 min" target={<>Réalisé · <b>15 min</b></>}/>

      <div className="repeat">
        <div className="repeat-head"><div className="rl">{I.repeat} Répété</div><Stepper v="8"/></div>
        <div className="repeat-body">
          <Step type="run" value="400 m" target={<>Réalisé · <b>400 m</b></>}/>
          <Step type="rec" value="1:00" target={<>Réalisé · <b>1:00</b></>}/>
        </div>
      </div>

      <Step type="cool" value="10 min" target={<>Réalisé · <b>10 min</b></>}/>

      <div className="total" style={{marginTop:14}}><span className="tl">Distance totale calculée</span><span className="tv">8,40 km</span></div>
      <div className="cta" style={{marginTop:16}}>Enregistrer ma course →</div>
    </div>
    <Tabs/>
  </div>
);

/* =============================================================
   SCREEN 4 — VIEW: coach vs réalisé
   ============================================================= */
const ScreenView = () => (
  <div className="screen">
    <AppBar pro avatar={AV_ATH}/>
    <div className="body">
      <div className="titlerow">
        <div className="backbtn">{I.back}</div>
        <div className="tt"><h1>test</h1><div className="date">Mardi 30 juin 2026</div></div>
        <div className="statuspill done">Réalisée</div>
      </div>
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
          <div className="card-h" style={{margin:0,textTransform:'none',fontSize:18}}>Coach vs réalisé</div>
          <div className="modbtn">Modifier</div>
        </div>
        <div className="plan-intro" style={{margin:'0 0 14px'}}>Valeur prévue <span style={{textDecoration:'line-through'}}>barrée</span>, valeur réalisée en bleu à droite.</div>

        <Step type="warm" value="15 min" edit={false} target={null}/>

        <div className="repeat">
          <div className="repeat-head"><div className="rl">{I.repeat} Répété</div><span className="sv" style={{fontSize:16, fontFamily:"'Archivo Black',sans-serif", fontStyle:'italic'}}>8×</span></div>
          <div className="repeat-body">
            <Step type="run" edit={false} compare={{old:"400 m", now:"420 m"}} target={null}/>
            <Step type="rec" edit={false} value="1:00" target={null}/>
          </div>
        </div>

        <Step type="cool" edit={false} compare={{old:"10 min", now:"8 min"}} target={null}/>
      </div>
      <div className="total"><span className="tl">Distance totale réalisée</span><span className="tv">8,76 km</span></div>
    </div>
    <Tabs/>
  </div>
);

const Phone = ({children}) => <IOSDevice width={390} height={844}>{children}</IOSDevice>;

function App(){
  return (
    <DesignCanvas title="Trainwise — Séance course (builder façon Garmin)" subtitle="Étapes color-codées par type + bloc « Répéter ×N ». Sérieux, sur la DA Trainwise.">
      <DCSection id="coach" title="Coté coach — création">
        <DCArtboard id="coach" label="① Builder d'étapes" width={420} height={920}>
          <Phone><ScreenCoach/></Phone>
        </DCArtboard>
      </DCSection>
      <DCSection id="athlete" title="Coté athlète — remplissage">
        <DCArtboard id="ressenti" label="② Ressenti + à compléter" width={420} height={920}>
          <Phone><ScreenRessenti/></Phone>
        </DCArtboard>
        <DCArtboard id="fill" label="③ Renseigner le plan" width={420} height={920}>
          <Phone><ScreenFill/></Phone>
        </DCArtboard>
      </DCSection>
      <DCSection id="view" title="Visualisation — sauvegardée">
        <DCArtboard id="view" label="④ Coach vs réalisé" width={420} height={920}>
          <Phone><ScreenView/></Phone>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
