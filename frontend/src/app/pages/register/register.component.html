<div class="auth-container">
  <div class="auth-card">
    <header>
      <h1>Trainwise</h1>
      <p class="subtitle">Inscription</p>
    </header>

    <!-- Progress indicator -->
    <div class="steps-indicator">
      <div class="step" [class.active]="currentStep() >= 1" [class.completed]="currentStep() > 1">
        <span class="step-number">1</span>
        <span class="step-label">Compte</span>
      </div>
      <div class="step-line" [class.active]="currentStep() > 1"></div>
      <div class="step" [class.active]="currentStep() >= 2">
        <span class="step-number">2</span>
        <span class="step-label">Profil</span>
      </div>
    </div>

    <!-- Step 1: Credentials -->
    @if (currentStep() === 1) {
      <form (ngSubmit)="nextStep()" class="auth-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            [(ngModel)]="email"
            name="email"
            placeholder="votre@email.com"
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <div class="password-wrapper">
            <input
              [type]="showPassword() ? 'text' : 'password'"
              id="password"
              [ngModel]="password()"
              (ngModelChange)="password.set($event)"
              name="password"
              placeholder="Minimum 6 caractères"
              autocomplete="new-password"
            >
            <button type="button" class="password-toggle" (click)="togglePassword()" [attr.aria-label]="showPassword() ? 'Masquer le mot de passe' : 'Afficher le mot de passe'">
              @if (showPassword()) {
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              } @else {
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              }
            </button>
          </div>

          @if (password()) {
            <div class="password-strength" [attr.data-strength]="passwordStrength()">
              <div class="strength-bar">
                <div class="strength-fill" [style.width.%]="(passwordStrength() / 4) * 100"></div>
              </div>
              <span class="strength-label">{{ passwordStrengthLabel() }}</span>
            </div>
          }
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmer le mot de passe</label>
          <div class="password-wrapper">
            <input
              [type]="showConfirmPassword() ? 'text' : 'password'"
              id="confirmPassword"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              placeholder="Confirmez votre mot de passe"
              autocomplete="new-password"
            >
            <button type="button" class="password-toggle" (click)="toggleConfirmPassword()" [attr.aria-label]="showConfirmPassword() ? 'Masquer le mot de passe' : 'Afficher le mot de passe'">
              @if (showConfirmPassword()) {
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              } @else {
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              }
            </button>
          </div>
        </div>

        @if (error()) {
          <div class="error-box">
            {{ error() }}
          </div>
        }

        <button type="submit" class="btn-primary">
          Continuer
        </button>
      </form>
    }

    <!-- Step 2: Profile -->
    @if (currentStep() === 2) {
      <form (ngSubmit)="onSubmit()" class="auth-form">
        <div class="form-group">
          <label for="firstName">Prénom</label>
          <input
            type="text"
            id="firstName"
            [(ngModel)]="firstName"
            name="firstName"
            placeholder="Votre prénom"
            autocomplete="given-name"
          >
        </div>

        <div class="form-group">
          <label for="lastName">Nom</label>
          <input
            type="text"
            id="lastName"
            [(ngModel)]="lastName"
            name="lastName"
            placeholder="Votre nom"
            autocomplete="family-name"
          >
        </div>

        <div class="form-group">
          <label for="phone">Téléphone <span class="optional">(optionnel)</span></label>
          <input
            type="tel"
            id="phone"
            [(ngModel)]="phone"
            name="phone"
            placeholder="06 12 34 56 78"
            autocomplete="tel"
          >
        </div>

        @if (error()) {
          <div class="error-box">
            {{ error() }}
          </div>
        }

        <div class="form-actions">
          <button type="button" class="btn-secondary" (click)="previousStep()">
            Retour
          </button>
          <button type="submit" class="btn-primary" [disabled]="isLoading()">
            @if (isLoading()) {
              Inscription...
            } @else {
              S'inscrire
            }
          </button>
        </div>
      </form>
    }

    <p class="auth-link">
      Déjà un compte ? <a routerLink="/login">Se connecter</a>
    </p>
  </div>
</div>
