<div class="auth-container">
  <div class="auth-card">
    <header>
      <h1>Trainwise</h1>
      <p class="subtitle">Connexion</p>
    </header>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          placeholder="votre@email.com"
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div class="password-wrapper">
          <input
            [type]="showPassword() ? 'text' : 'password'"
            id="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Votre mot de passe"
            autocomplete="current-password"
          >
          <button type="button" class="password-toggle" (click)="togglePassword()" [attr.aria-label]="showPassword() ? 'Masquer le mot de passe' : 'Afficher le mot de passe'">
            @if (showPassword()) {
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            } @else {
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            }
          </button>
        </div>
        <a routerLink="/forgot-password" class="forgot-link">Mot de passe oublié ?</a>
      </div>

      @if (resetSuccess()) {
        <div class="success-box">
          Mot de passe réinitialisé avec succès. Vous pouvez vous connecter.
        </div>
      }

      @if (error()) {
        <div class="error-box">
          {{ error() }}
        </div>
      }

      <button type="submit" class="btn-primary" [disabled]="isLoading()">
        @if (isLoading()) {
          Connexion en cours...
        } @else {
          Se connecter
        }
      </button>
    </form>

    <p class="auth-link">
      Pas encore de compte ? <a routerLink="/register">S'inscrire</a>
    </p>
  </div>
</div>
