<app-navbar></app-navbar>

<div class="container">
  <div class="page-header">
    <button class="back-btn" (click)="goBack()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Retour
    </button>
  </div>

  @if (error()) {
    <div class="alert error">{{ error() }}</div>
  }
  @if (successMessage()) {
    <div class="alert success">{{ successMessage() }}</div>
  }

  @if (isLoading()) {
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <p>Chargement...</p>
    </div>
  } @else if (session() || draft()) {
    <div class="session-summary">
      <div class="summary-icon">🏃</div>
      <div class="summary-info">
        <h1>{{ getSessionTypeLabel(sessionType()) }}</h1>
        <p class="summary-date">{{ formatDate(date()) }}</p>
      </div>
      @if (isNew()) {
        <span class="draft-badge">Brouillon</span>
      }
    </div>

    <div class="form-block">
      <label>Consignes globales</label>
      <textarea [ngModel]="description()" (ngModelChange)="description.set($event)" rows="3" placeholder="Instructions pour l'athlète..."></textarea>
    </div>

    <app-run-blocks-editor
      [blocks]="blocks()"
      title="Plan de la séance"
      [compact]="true"
      [enableVmaPaces]="true"
      [athleteVma]="athleteVma()"
      (blocksChange)="onBlocksChange($event)">
    </app-run-blocks-editor>

    <div class="form-actions">
      @if (isNew()) {
        <button type="button" class="btn-create" [disabled]="isSaving()" (click)="saveSession()">
          {{ isSaving() ? 'Création...' : 'Créer la séance' }}
        </button>
      } @else {
        <button type="button" class="btn-save-template" [disabled]="isSavingTemplate()" (click)="saveAsTemplate()">
          <span aria-hidden="true">📚</span>
          {{ isSavingTemplate() ? 'Sauvegarde...' : 'Sauvegarder dans ma bibliothèque' }}
        </button>
        <button type="button" class="btn-primary" [disabled]="isSaving()" (click)="saveSession()">
          {{ isSaving() ? 'Enregistrement...' : 'Enregistrer la séance' }}
        </button>
      }
    </div>
  }
</div>
