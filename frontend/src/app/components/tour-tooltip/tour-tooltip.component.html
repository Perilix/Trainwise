@if (isVisible()) {
  <!-- Couche qui bloque l'interaction avec la page (et l'assombrit si pas d'ancre) -->
  <div class="tour-backdrop" [class.dimmed]="!targetRect()" (click)="!targetRect() && dismiss()"></div>

  <!-- Trou lumineux sur l'élément ciblé -->
  @if (spotlightStyle(); as sp) {
    <div class="tour-spotlight"
         [style.top]="sp.top"
         [style.left]="sp.left"
         [style.width]="sp.width"
         [style.height]="sp.height"></div>
  }

  <div class="tour-card"
       [class.visible]="isVisible()"
       [class.anchored]="!!tooltipStyle()"
       [style.top]="tooltipStyle()?.top"
       [style.left]="tooltipStyle()?.left">

    <div class="tour-step-content">
      <div class="tour-icon-wrap">
        <i [class]="'fa-solid ' + currentStep().faIcon"></i>
      </div>
      <div class="tour-text">
        <p class="tour-title">{{ currentStep().title }}</p>
        <p class="tour-description">{{ currentStep().description }}</p>
      </div>
    </div>

    <div class="tour-footer" [class.has-dots]="isMultiStep()">
      @if (isMultiStep()) {
        <div class="tour-dots">
          @for (step of allSteps(); track $index) {
            <span class="dot" [class.active]="$index === currentStepIndex()"></span>
          }
        </div>
      }

      <div class="tour-actions">
        @if (isMultiStep() && !isFirstStep()) {
          <button class="btn-prev" (click)="prevStep()">
            <i class="fa-solid fa-arrow-left"></i>
          </button>
        }
        <button class="btn-dismiss-text" (click)="dismiss()">Passer</button>
        @if (!isLastStep()) {
          <button class="btn-next" (click)="nextStep()">
            Suivant <i class="fa-solid fa-arrow-right"></i>
          </button>
        } @else {
          <button class="btn-got-it" (click)="dismiss()">
            Compris <i class="fa-solid fa-check"></i>
          </button>
        }
      </div>
    </div>

  </div>
}
